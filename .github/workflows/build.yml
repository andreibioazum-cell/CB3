name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0
          ndk: 25.2.9519653
          cmake: 3.22.1

      - name: Setup Project
        run: |
          mkdir -p app/src/main/cpp
          mkdir -p app/src/main/java/com/cubicbattle
          
          # Копируем все .cpp и .hpp
          cp *.cpp app/src/main/cpp/ || true
          cp *.hpp app/src/main/cpp/ || true

      - name: Create main.cpp (OpenGL ES 3.0)
        run: |
          cat > app/src/main/cpp/main.cpp << 'EOF'
          #include <jni.h>
          #include <android/log.h>
          #include <android/native_window.h>
          #include <android/native_window_jni.h>
          #include <EGL/egl.h>
          #include <GLES3/gl3.h>

          #define LOG_TAG "CubicBattle"
          #define LOGI(...) __android_log_print(ANDROID_LOG_INFO, LOG_TAG, __VA_ARGS__)
          #define LOGE(...) __android_log_print(ANDROID_LOG_ERROR, LOG_TAG, __VA_ARGS__)

          EGLDisplay display = EGL_NO_DISPLAY;
          EGLSurface surface = EGL_NO_SURFACE;
          EGLContext context = EGL_NO_CONTEXT;

          // Шейдеры для OpenGL ES 3.0
          const char* vertexShader = 
              "#version 300 es\n"
              "in vec2 aPos;\n"
              "void main() {\n"
              "   gl_Position = vec4(aPos, 0.0, 1.0);\n"
              "}";

          const char* fragmentShader = 
              "#version 300 es\n"
              "precision highp float;\n"
              "out vec4 FragColor;\n"
              "void main() {\n"
              "   FragColor = vec4(0.0, 1.0, 0.0, 1.0);\n"
              "}";

          GLuint program = 0;
          GLuint vbo = 0;
          GLuint vao = 0;

          bool initOpenGL(ANativeWindow* window) {
              LOGI("=== initOpenGL ES 3.0 START ===");
              
              display = eglGetDisplay(EGL_DEFAULT_DISPLAY);
              if (display == EGL_NO_DISPLAY) {
                  LOGE("eglGetDisplay failed!");
                  return false;
              }
              LOGI("eglGetDisplay OK");
              
              EGLint major, minor;
              if (!eglInitialize(display, &major, &minor)) {
                  LOGE("eglInitialize failed!");
                  return false;
              }
              LOGI("eglInitialize OK, version %d.%d", major, minor);
              
              EGLint attribs[] = {
                  EGL_RENDERABLE_TYPE, EGL_OPENGL_ES3_BIT,
                  EGL_BLUE_SIZE, 8,
                  EGL_GREEN_SIZE, 8,
                  EGL_RED_SIZE, 8,
                  EGL_SURFACE_TYPE, EGL_WINDOW_BIT,
                  EGL_NONE
              };
              
              EGLConfig config;
              EGLint numConfigs;
              if (!eglChooseConfig(display, attribs, &config, 1, &numConfigs)) {
                  LOGE("eglChooseConfig failed!");
                  return false;
              }
              LOGI("eglChooseConfig OK, numConfigs: %d", numConfigs);
              
              EGLint contextAttribs[] = {
                  EGL_CONTEXT_CLIENT_VERSION, 3,
                  EGL_NONE
              };
              
              context = eglCreateContext(display, config, EGL_NO_CONTEXT, contextAttribs);
              if (context == EGL_NO_CONTEXT) {
                  LOGE("eglCreateContext failed!");
                  return false;
              }
              LOGI("eglCreateContext OK");
              
              surface = eglCreateWindowSurface(display, config, window, nullptr);
              if (surface == EGL_NO_SURFACE) {
                  LOGE("eglCreateWindowSurface failed!");
                  return false;
              }
              LOGI("eglCreateWindowSurface OK");
              
              if (!eglMakeCurrent(display, surface, surface, context)) {
                  LOGE("eglMakeCurrent failed!");
                  return false;
              }
              LOGI("eglMakeCurrent OK");
              
              const char* version = (const char*)glGetString(GL_VERSION);
              LOGI("OpenGL Version: %s", version ? version : "unknown");
              
              LOGI("=== initOpenGL SUCCESS ===");
              return true;
          }

          bool createShaders() {
              LOGI("=== createShaders START ===");
              
              GLuint vs = glCreateShader(GL_VERTEX_SHADER);
              glShaderSource(vs, 1, &vertexShader, nullptr);
              glCompileShader(vs);
              
              GLint compiled;
              glGetShaderiv(vs, GL_COMPILE_STATUS, &compiled);
              if (!compiled) {
                  LOGE("Vertex shader compile failed!");
                  char log[512];
                  glGetShaderInfoLog(vs, 512, nullptr, log);
                  LOGE("Log: %s", log);
                  return false;
              }
              LOGI("Vertex shader compiled");
              
              GLuint fs = glCreateShader(GL_FRAGMENT_SHADER);
              glShaderSource(fs, 1, &fragmentShader, nullptr);
              glCompileShader(fs);
              
              glGetShaderiv(fs, GL_COMPILE_STATUS, &compiled);
              if (!compiled) {
                  LOGE("Fragment shader compile failed!");
                  char log[512];
                  glGetShaderInfoLog(fs, 512, nullptr, log);
                  LOGE("Log: %s", log);
                  return false;
              }
              LOGI("Fragment shader compiled");
              
              program = glCreateProgram();
              glAttachShader(program, vs);
              glAttachShader(program, fs);
              glLinkProgram(program);
              
              GLint linked;
              glGetProgramiv(program, GL_LINK_STATUS, &linked);
              if (!linked) {
                  LOGE("Program link failed!");
                  char log[512];
                  glGetProgramInfoLog(program, 512, nullptr, log);
                  LOGE("Log: %s", log);
                  return false;
              }
              LOGI("Program linked");
              
              glDeleteShader(vs);
              glDeleteShader(fs);
              
              LOGI("=== createShaders SUCCESS ===");
              return true;
          }

          void createQuad() {
              LOGI("=== createQuad START ===");
              
              glGenVertexArrays(1, &vao);
              glBindVertexArray(vao);
              
              float vertices[] = {
                  -0.5f, -0.5f,
                   0.5f, -0.5f,
                   0.5f,  0.5f,
                  -0.5f,  0.5f
              };
              
              glGenBuffers(1, &vbo);
              glBindBuffer(GL_ARRAY_BUFFER, vbo);
              glBufferData(GL_ARRAY_BUFFER, sizeof(vertices), vertices, GL_STATIC_DRAW);
              
              GLint posLoc = glGetAttribLocation(program, "aPos");
              glEnableVertexAttribArray(posLoc);
              glVertexAttribPointer(posLoc, 2, GL_FLOAT, GL_FALSE, 0, 0);
              
              glBindVertexArray(0);
              
              LOGI("createQuad OK, VAO=%d, VBO=%d", vao, vbo);
          }

          extern "C" JNIEXPORT void JNICALL
          Java_com_cubicbattle_GameActivity_nativeInit(JNIEnv* env, jobject obj, jobject surface) {
              LOGI("=== nativeInit START ===");
              
              ANativeWindow* window = ANativeWindow_fromSurface(env, surface);
              if (window == nullptr) {
                  LOGE("ANativeWindow_fromSurface failed!");
                  return;
              }
              LOGI("ANativeWindow OK");
              
              if (!initOpenGL(window)) {
                  LOGE("initOpenGL FAILED!");
                  return;
              }
              
              if (!createShaders()) {
                  LOGE("createShaders FAILED!");
                  return;
              }
              
              createQuad();
              
              LOGI("=== nativeInit SUCCESS ===");
          }

          extern "C" JNIEXPORT void JNICALL
          Java_com_cubicbattle_GameActivity_nativeUpdate(JNIEnv* env, jobject obj, jfloat dt) {
              // Nothing
          }

          extern "C" JNIEXPORT void JNICALL
          Java_com_cubicbattle_GameActivity_nativeDraw(JNIEnv* env, jobject obj) {
              if (display == EGL_NO_DISPLAY || surface == EGL_NO_SURFACE) {
                  LOGE("nativeDraw: EGL not initialized!");
                  return;
              }
              
              if (!eglMakeCurrent(display, surface, surface, context)) {
                  LOGE("nativeDraw: eglMakeCurrent failed!");
                  return;
              }
              
              glClearColor(0.0f, 0.0f, 1.0f, 1.0f);
              glClear(GL_COLOR_BUFFER_BIT);
              
              if (program != 0 && vao != 0) {
                  glUseProgram(program);
                  glBindVertexArray(vao);
                  glDrawArrays(GL_TRIANGLE_FAN, 0, 4);
              }
              
              if (!eglSwapBuffers(display, surface)) {
                  LOGE("nativeDraw: eglSwapBuffers failed!");
              }
          }

          extern "C" JNIEXPORT void JNICALL
          Java_com_cubicbattle_GameActivity_nativeTouch(JNIEnv* env, jobject obj, jfloat x, jfloat y, jboolean pressed) {
              LOGI("Touch: x=%.1f y=%.1f pressed=%d", x, y, pressed);
          }
          EOF

      - name: Create CMakeLists.txt
        run: |
          cat > app/src/main/cpp/CMakeLists.txt << 'EOF'
          cmake_minimum_required(VERSION 3.22)
          project(CubicBattle)
          
          set(CMAKE_CXX_STANDARD 17)
          set(CMAKE_CXX_STANDARD_REQUIRED ON)
          set(CMAKE_CXX_EXTENSIONS ON)
          
          add_library(cubicbattle SHARED
              main.cpp
              lobby.cpp
              game.cpp
              enemy.cpp
          )
          
          target_include_directories(cubicbattle PRIVATE
              ${CMAKE_CURRENT_SOURCE_DIR}
          )
          
          target_compile_definitions(cubicbattle PRIVATE _GNU_SOURCE)
          
          target_link_libraries(cubicbattle
              log
              android
              EGL
              GLESv3
          )
          EOF

      - name: Create Java Activity
        run: |
          cat > app/src/main/java/com/cubicbattle/GameActivity.java << 'EOF'
          package com.cubicbattle;
          
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.SurfaceView;
          import android.view.SurfaceHolder;
          import android.view.MotionEvent;
          
          public class GameActivity extends Activity implements SurfaceHolder.Callback {
              private SurfaceView surfaceView;
              private boolean running = false;
              private Thread gameThread;
              
              static {
                  System.loadLibrary("cubicbattle");
              }
              
              public native void nativeInit(Object surface);
              public native void nativeUpdate(float dt);
              public native void nativeDraw();
              public native void nativeTouch(float x, float y, boolean pressed);
              
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  surfaceView = new SurfaceView(this);
                  surfaceView.getHolder().addCallback(this);
                  setContentView(surfaceView);
              }
              
              @Override
              public void surfaceCreated(SurfaceHolder holder) {
                  running = true;
                  nativeInit(holder.getSurface());
                  
                  gameThread = new Thread(() -> {
                      long lastTime = System.nanoTime();
                      while (running) {
                          long now = System.nanoTime();
                          float dt = (now - lastTime) / 1000000000.0f;
                          lastTime = now;
                          
                          if (dt > 0.05f) dt = 0.05f;
                          
                          nativeUpdate(dt);
                          nativeDraw();
                          
                          try {
                              Thread.sleep(16);
                          } catch (InterruptedException e) {}
                      }
                  });
                  gameThread.start();
              }
              
              @Override
              public void surfaceChanged(SurfaceHolder holder, int format, int width, int height) {}
              
              @Override
              public void surfaceDestroyed(SurfaceHolder holder) {
                  running = false;
                  if (gameThread != null) {
                      try {
                          gameThread.join();
                      } catch (InterruptedException e) {}
                  }
              }
              
              @Override
              public boolean onTouchEvent(MotionEvent event) {
                  float x = event.getX();
                  float y = event.getY();
                  
                  int action = event.getActionMasked();
                  if (action == MotionEvent.ACTION_DOWN || action == MotionEvent.ACTION_POINTER_DOWN) {
                      nativeTouch(x, y, true);
                  } else if (action == MotionEvent.ACTION_UP || action == MotionEvent.ACTION_POINTER_UP) {
                      nativeTouch(x, y, false);
                  }
                  
                  return true;
              }
          }
          EOF

      - name: Create Android Manifest (ES 3.0)
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.cubicbattle">
              
              <uses-feature 
                  android:glEsVersion="0x00030000" 
                  android:required="true" />
              
              <application 
                  android:label="Cubic Battle 3" 
                  android:theme="@android:style/Theme.Black.NoTitleBar.Fullscreen"
                  android:allowBackup="true">
                  <activity 
                      android:name=".GameActivity" 
                      android:exported="true" 
                      android:screenOrientation="portrait"
                      android:configChanges="orientation|screenSize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Create Gradle Files
        run: |
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.2'
              }
          }
          
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF
          
          echo "include ':app'" > settings.gradle
          
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          
          android {
              namespace 'com.cubicbattle'
              compileSdk 34
              ndkVersion "25.2.9519653"
              
              defaultConfig {
                  applicationId "com.cubicbattle.game"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
                  
                  ndk {
                      abiFilters 'arm64-v8a'
                  }
                  
                  externalNativeBuild {
                      cmake {
                          arguments '-DANDROID_STL=c++_shared'
                          cppFlags '-std=c++17 -D_GNU_SOURCE'
                      }
                  }
              }
              
              externalNativeBuild {
                  cmake {
                      path "src/main/cpp/CMakeLists.txt"
                      version "3.22.1"
                  }
              }
              
              buildTypes {
                  debug {
                      ndk {
                          debugSymbolLevel 'full'
                      }
                  }
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
                  }
              }
          }
          EOF

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CubicBattle3-Android
          path: app/build/outputs/apk/debug/*.apk
