name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0
          ndk: 25.2.9519653
          cmake: 3.22.1

      - name: Setup Project
        run: |
          mkdir -p app/src/main/cpp
          mkdir -p app/src/main/java/com/cubicbattle

      - name: Create main.cpp
        run: |
          cat > app/src/main/cpp/main.cpp << 'EOF'
          #include <jni.h>
          #include <android/log.h>
          #include <android/native_window.h>
          #include <android/native_window_jni.h>
          #include <EGL/egl.h>
          #include <GLES2/gl2.h>

          #define LOG_TAG "CubicBattle"
          #define LOGI(...) __android_log_print(ANDROID_LOG_INFO, LOG_TAG, __VA_ARGS__)
          #define LOGE(...) __android_log_print(ANDROID_LOG_ERROR, LOG_TAG, __VA_ARGS__)

          EGLDisplay display = EGL_NO_DISPLAY;
          EGLSurface surface = EGL_NO_SURFACE;
          EGLContext context = EGL_NO_CONTEXT;

          bool initOpenGL(ANativeWindow* window) {
              LOGI("=== initOpenGL START ===");
              
              display = eglGetDisplay(EGL_DEFAULT_DISPLAY);
              if (display == EGL_NO_DISPLAY) {
                  LOGE("eglGetDisplay failed");
                  return false;
              }
              LOGI("eglGetDisplay OK");
              
              EGLint major, minor;
              if (!eglInitialize(display, &major, &minor)) {
                  LOGE("eglInitialize failed");
                  return false;
              }
              LOGI("eglInitialize OK: %d.%d", major, minor);
              
              EGLint attribs[] = {
                  EGL_SURFACE_TYPE, EGL_WINDOW_BIT,
                  EGL_BLUE_SIZE, 8,
                  EGL_GREEN_SIZE, 8,
                  EGL_RED_SIZE, 8,
                  EGL_NONE
              };
              
              EGLConfig config;
              EGLint numConfigs;
              if (!eglChooseConfig(display, attribs, &config, 1, &numConfigs)) {
                  LOGE("eglChooseConfig failed");
                  return false;
              }
              LOGI("eglChooseConfig OK: %d configs", numConfigs);
              
              EGLint contextAttribs[] = {
                  EGL_CONTEXT_CLIENT_VERSION, 2,
                  EGL_NONE
              };
              
              context = eglCreateContext(display, config, EGL_NO_CONTEXT, contextAttribs);
              if (context == EGL_NO_CONTEXT) {
                  LOGE("eglCreateContext failed");
                  return false;
              }
              LOGI("eglCreateContext OK");
              
              surface = eglCreateWindowSurface(display, config, window, nullptr);
              if (surface == EGL_NO_SURFACE) {
                  LOGE("eglCreateWindowSurface failed");
                  return false;
              }
              LOGI("eglCreateWindowSurface OK");
              
              if (!eglMakeCurrent(display, surface, surface, context)) {
                  LOGE("eglMakeCurrent failed");
                  return false;
              }
              LOGI("eglMakeCurrent OK");
              
              const char* version = (const char*)glGetString(GL_VERSION);
              LOGI("GL_VERSION: %s", version ? version : "null");
              
              LOGI("=== initOpenGL SUCCESS ===");
              return true;
          }

          extern "C" JNIEXPORT void JNICALL
          Java_com_cubicbattle_GameActivity_nativeInit(JNIEnv* env, jobject obj, jobject surface) {
              LOGI("=== nativeInit ===");
              
              ANativeWindow* window = ANativeWindow_fromSurface(env, surface);
              if (window == nullptr) {
                  LOGE("ANativeWindow_fromSurface failed");
                  return;
              }
              LOGI("ANativeWindow OK");
              
              if (!initOpenGL(window)) {
                  LOGE("initOpenGL FAILED");
                  return;
              }
              
              LOGI("=== nativeInit DONE ===");
          }

          extern "C" JNIEXPORT void JNICALL
          Java_com_cubicbattle_GameActivity_nativeUpdate(JNIEnv* env, jobject obj, jfloat dt) {}

          extern "C" JNIEXPORT void JNICALL
          Java_com_cubicbattle_GameActivity_nativeDraw(JNIEnv* env, jobject obj) {
              if (display == EGL_NO_DISPLAY || surface == EGL_NO_SURFACE) {
                  LOGE("draw: EGL not ready");
                  return;
              }
              
              if (!eglMakeCurrent(display, surface, surface, context)) {
                  LOGE("draw: eglMakeCurrent failed");
                  return;
              }
              
              glClearColor(1.0f, 0.0f, 0.0f, 1.0f);
              glClear(GL_COLOR_BUFFER_BIT);
              
              GLenum error = glGetError();
              if (error != GL_NO_ERROR) {
                  LOGE("glError: 0x%x", error);
              }
              
              if (!eglSwapBuffers(display, surface)) {
                  LOGE("eglSwapBuffers failed");
              }
          }

          extern "C" JNIEXPORT void JNICALL
          Java_com_cubicbattle_GameActivity_nativeTouch(JNIEnv* env, jobject obj, jfloat x, jfloat y, jboolean pressed) {
              LOGI("Touch: %.0f, %.0f, %d", x, y, pressed);
          }
          EOF

      - name: Create CMakeLists.txt
        run: |
          cat > app/src/main/cpp/CMakeLists.txt << 'EOF'
          cmake_minimum_required(VERSION 3.22)
          project(CubicBattle)
          set(CMAKE_CXX_STANDARD 17)
          add_library(cubicbattle SHARED main.cpp)
          target_link_libraries(cubicbattle log android EGL GLESv2)
          EOF

      - name: Create Java Activity
        run: |
          cat > app/src/main/java/com/cubicbattle/GameActivity.java << 'EOF'
          package com.cubicbattle;
          
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.SurfaceView;
          import android.view.SurfaceHolder;
          import android.view.MotionEvent;
          
          public class GameActivity extends Activity implements SurfaceHolder.Callback {
              private SurfaceView surfaceView;
              private boolean running = false;
              private Thread gameThread;
              
              static {
                  System.loadLibrary("cubicbattle");
              }
              
              public native void nativeInit(Object surface);
              public native void nativeUpdate(float dt);
              public native void nativeDraw();
              public native void nativeTouch(float x, float y, boolean pressed);
              
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  surfaceView = new SurfaceView(this);
                  surfaceView.getHolder().addCallback(this);
                  setContentView(surfaceView);
              }
              
              @Override
              public void surfaceCreated(SurfaceHolder holder) {
                  running = true;
                  nativeInit(holder.getSurface());
                  
                  gameThread = new Thread(() -> {
                      long lastTime = System.nanoTime();
                      while (running) {
                          long now = System.nanoTime();
                          float dt = (now - lastTime) / 1000000000.0f;
                          lastTime = now;
                          if (dt > 0.05f) dt = 0.05f;
                          nativeUpdate(dt);
                          nativeDraw();
                          try { Thread.sleep(16); } catch (InterruptedException e) {}
                      }
                  });
                  gameThread.start();
              }
              
              @Override
              public void surfaceChanged(SurfaceHolder holder, int format, int width, int height) {}
              
              @Override
              public void surfaceDestroyed(SurfaceHolder holder) {
                  running = false;
                  if (gameThread != null) {
                      try { gameThread.join(); } catch (InterruptedException e) {}
                  }
              }
              
              @Override
              public boolean onTouchEvent(MotionEvent event) {
                  float x = event.getX();
                  float y = event.getY();
                  int action = event.getActionMasked();
                  if (action == MotionEvent.ACTION_DOWN || action == MotionEvent.ACTION_POINTER_DOWN) {
                      nativeTouch(x, y, true);
                  } else if (action == MotionEvent.ACTION_UP || action == MotionEvent.ACTION_POINTER_UP) {
                      nativeTouch(x, y, false);
                  }
                  return true;
              }
          }
          EOF

      - name: Create Android Manifest
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.cubicbattle">
              <application 
                  android:label="Cubic Battle 3" 
                  android:theme="@android:style/Theme.Black.NoTitleBar.Fullscreen"
                  android:allowBackup="true">
                  <activity 
                      android:name=".GameActivity" 
                      android:exported="true" 
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Create Gradle Files
        run: |
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF
          echo "include ':app'" > settings.gradle
          
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.cubicbattle'
              compileSdk 34
              defaultConfig {
                  applicationId "com.cubicbattle.game"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
                  externalNativeBuild { cmake { cppFlags '-std=c++17' } }
              }
              externalNativeBuild { cmake { path "src/main/cpp/CMakeLists.txt" } }
          }
          EOF

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CubicBattle3-Android
          path: app/build/outputs/apk/debug/*.apk
