name: 1. Cleanup and Create Files
on:
  workflow_dispatch: # Запуск вручную

jobs:
  init:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean and Generate
        run: |
          # Удаляем всё в корне, кроме папки .github (чтобы не удалить сам экшен)
          find . -maxdepth 1 ! -name '.github' ! -name '.' -exec rm -rf {} +

          # 1. С++ Код (NativeActivity + OpenGL ES 3.0)
          cat > main.cpp << 'EOF'
          #include <android/native_window_jni.h>
          #include <android_native_app_glue.h>
          #include <GLES3/gl3.h>
          #include <EGL/egl.h>

          struct Engine {
              android_app* app;
              EGLDisplay display; EGLSurface surface; EGLContext context;
          };

          const char* vSrc = "#version 300 es\nlayout(location=0) in vec3 p; void main(){gl_Position=vec4(p,1.0);}";
          const char* fSrc = "#version 300 es\nprecision mediump float; out vec4 c; void main(){c=vec4(0.0,0.5,1.0,1.0);}";

          void init_gl(Engine* e) {
              e->display = eglGetDisplay(EGL_DEFAULT_DISPLAY);
              eglInitialize(e->display, 0, 0);
              const EGLint att[] = { EGL_RENDERABLE_TYPE, EGL_OPENGL_ES3_BIT, EGL_SURFACE_TYPE, EGL_WINDOW_BIT, EGL_NONE };
              EGLConfig cfg; EGLint n; eglChooseConfig(e->display, att, &cfg, 1, &n);
              EGLint ctx_att[] = { EGL_CONTEXT_CLIENT_VERSION, 3, EGL_NONE };
              e->surface = eglCreateWindowSurface(e->display, cfg, e->app->window, NULL);
              e->context = eglCreateContext(e->display, cfg, NULL, ctx_att);
              eglMakeCurrent(e->display, e->surface, e->surface, e->context);
              GLuint v = glCreateShader(GL_VERTEX_SHADER); glShaderSource(v, 1, &vSrc, 0); glCompileShader(v);
              GLuint f = glCreateShader(GL_FRAGMENT_SHADER); glShaderSource(f, 1, &fSrc, 0); glCompileShader(f);
              GLuint p = glCreateProgram(); glAttachShader(p, v); glAttachShader(p, f); glLinkProgram(p); glUseProgram(p);
          }

          void android_main(struct android_app* state) {
              Engine engine = {state};
              state->onAppCmd = [](struct android_app* app, int32_t cmd) {
                  if (cmd == APP_CMD_INIT_WINDOW) init_gl((Engine*)app->userData);
              };
              state->userData = &engine;
              while (1) {
                  int i, ev; android_poll_source* s;
                  while ((i = ALooper_pollAll(0, NULL, &ev, (void**)&s)) >= 0) {
                      if (s) s->process(state, s);
                      if (state->destroyRequested) return;
                  }
                  if (engine.display) {
                      glClearColor(0.1f, 0.1f, 0.1f, 1.0f); glClear(GL_COLOR_BUFFER_BIT);
                      float v[] = {-0.5f,0.5f,0, -0.5f,-0.5f,0, 0.5f,-0.5f,0, 0.5f,0.5f,0};
                      unsigned short id[] = {0,1,2, 0,2,3};
                      glVertexAttribPointer(0, 3, GL_FLOAT, GL_FALSE, 0, v); glEnableVertexAttribArray(0);
                      glDrawElements(GL_TRIANGLES, 6, GL_UNSIGNED_SHORT, id);
                      eglSwapBuffers(engine.display, engine.surface);
                  }
              }
          }
          EOF

          # 2. CMakeLists.txt
          cat > CMakeLists.txt << 'EOF'
          cmake_minimum_required(VERSION 3.22)
          project(NativeProject)
          add_library(native_app SHARED main.cpp ${ANDROID_NDK}/sources/android/native_app_glue/android_native_app_glue.c)
          target_include_directories(native_app PRIVATE ${ANDROID_NDK}/sources/android/native_app_glue)
          target_link_libraries(native_app GLESv3 EGL android log)
          EOF

          # 3. AndroidManifest.xml
          cat > AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.native.gles3">
              <application android:hasCode="false" android:label="OpenGL3Pure">
                  <activity android:name="android.app.NativeActivity" android:exported="true">
                      <meta-data android:name="android.app.lib_name" android:value="native_app" />
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 4. build.gradle (в корне)
          cat > build.gradle << 'EOF'
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          apply plugin: 'com.android.application'
          android {
              namespace 'com.native.gles3'
              compileSdk 34
              defaultConfig { minSdk 26; targetSdk 34; ndk { abiFilters 'arm64-v8a' } }
              sourceSets { main { manifest.srcFile 'AndroidManifest.xml' } }
              externalNativeBuild { cmake { path 'CMakeLists.txt' } }
          }
          EOF

          # 5. settings.gradle
          echo "rootProject.name = 'NativeApp'" > settings.gradle

      - name: Commit and Push
        run: |
          git config --global user.name "Actions Bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "Pure C++ Project Root Overwrite"
          git push origin main --force
